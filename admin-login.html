<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login for Majestic Primary and High School, Mysore. Access administrative dashboard and school management tools.">
    <meta name="keywords" content="admin login Majestic School Mysore, administrator access, school management, admin dashboard">
    <meta name="author" content="Majestic Primary and High School">
    <link rel="canonical" href="https://www.majesticschoolmysore.com/admin-login.html">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <title>Admin Login | Majestic Primary and High School</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-blue: #0f172a; /* Sophisticated deep slate blue */
            --brand-blue: #1e3a8a;
            --premium-gold: #facc15;
            --premium-green: #10b981;
            --white: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.88) 0%, rgba(30, 41, 59, 0.7) 50%, rgba(15, 23, 42, 0.9) 100%), 
                        url('assets/school_building.jpeg') center/cover no-repeat fixed;
            overflow: hidden;
            position: relative;
        }

        /* Ambient dramatic vignette overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 20%, rgba(15, 23, 42, 0.95) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .login-container-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            box-sizing: border-box;
        }

        .login-glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: white;
            position: relative;
            overflow: visible;
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) forwards, glowPulse 6s infinite ease-in-out;
        }

        @keyframes cardAppear {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes glowPulse {
            0% {
                border-color: rgba(255, 255, 255, 0.08);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(250, 204, 21, 0.03);
            }
            50% {
                border-color: rgba(250, 204, 21, 0.15);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 45px rgba(250, 204, 21, 0.08);
            }
            100% {
                border-color: rgba(255, 255, 255, 0.08);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(250, 204, 21, 0.03);
            }
        }

        /* Centered Logo Container */
        .logo-wrapper-pro {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px auto;
            border: 2px solid rgba(250, 204, 21, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 15px rgba(250, 204, 21, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-wrapper-pro:hover {
            transform: scale(1.04);
            border-color: rgba(250, 204, 21, 0.5);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4), 0 0 25px rgba(250, 204, 21, 0.3);
        }

        .login-logo {
            width: 52px !important;
            height: 52px !important;
            object-fit: contain !important;
            display: block !important;
            margin: 0 !important;
        }

        /* Secure Badge */
        .login-portal-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(250, 204, 21, 0.08);
            border: 1px solid rgba(250, 204, 21, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .login-glass-card h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            margin: 0 0 8px 0;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .login-glass-card p.subtitle {
            font-size: 0.92rem;
            color: rgba(255, 255, 255, 0.65);
            margin: 0 0 35px 0;
            letter-spacing: 0.5px;
        }

        /* Form Design */
        .input-group-pro {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group-pro label {
            display: block;
            font-size: 0.74rem;
            font-weight: 700;
            margin-bottom: 8px;
            margin-left: 2px;
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-field-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .input-group-pro input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px 20px 15px 48px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        .input-group-pro input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group-pro input:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--premium-gold);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.15), inset 0 0 5px rgba(255, 255, 255, 0.05);
        }

        .input-group-pro input:focus + .input-icon {
            color: var(--premium-gold);
            transform: translateY(-50%) scale(1.05);
        }

        /* Extra Form Options */
        .form-options-pro {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.82rem;
            margin-bottom: 28px;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-options-pro a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .form-options-pro a:hover {
            color: var(--premium-gold);
            text-shadow: 0 0 8px rgba(250, 204, 21, 0.3);
        }

        /* Gold Gradient Button */
        .login-btn-pro {
            width: 100%;
            background: linear-gradient(135deg, #facc15, #ca8a04);
            color: #0f172a !important;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 18px rgba(202, 138, 4, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn-pro:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 28px rgba(202, 138, 4, 0.45) , 0 0 20px rgba(250, 204, 21, 0.15);
            background: linear-gradient(135deg, #ffffff, #facc15);
        }

        /* Success & Error Messages */
        .status-msg-pro {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.88rem;
            display: none;
            align-items: center;
            gap: 10px;
            justify-content: center;
            text-align: center;
        }

        .error-msg {
            color: #f87171;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .success-msg {
            color: var(--premium-green);
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* Secure Trust Note */
        .secure-trust-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        .secure-trust-badge i {
            color: var(--premium-green);
            font-size: 0.85rem;
        }

        /* Footer Links Redesign */
        .portal-footer-pro {
            margin-top: 30px;
            text-align: center;
        }

        .footer-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 22px 0;
        }

        .footer-divider::before, .footer-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-divider:before {
            margin-right: 15px;
        }

        .footer-divider:after {
            margin-left: 15px;
        }

        .footer-divider span {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-hint {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
        }

        .login-hint a {
            color: var(--premium-gold);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-hint a:hover {
            color: white;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.4);
        }

        /* Fixed Pill Back Button */
        .back-home {
            position: fixed;
            top: 30px;
            left: 30px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            opacity: 0.9;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(15, 23, 42, 0.55);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
        }

        .back-home:hover {
            opacity: 1;
            background: var(--premium-gold);
            color: #0f172a !important;
            border-color: var(--premium-gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.3);
        }

        .back-home i {
            transition: transform 0.3s ease;
        }

        .back-home:hover i {
            transform: translateX(-3px);
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                height: auto !important;
                min-height: 100vh !important;
                padding: 110px 16px 40px 16px !important;
                box-sizing: border-box !important;
                overflow-y: auto !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }

            .login-container-wrapper {
                padding: 0;
            }

            .login-glass-card {
                padding: 40px 24px;
                border-radius: 24px !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .back-home {
                top: 24px !important;
                left: 16px !important;
                right: 16px !important;
                justify-content: center !important;
                width: auto !important;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="login-container-wrapper">
        <div class="login-glass-card">
            <div class="logo-wrapper-pro">
                <img src="assets/logo.png" referrerPolicy="no-referrer" alt="Majestic School Logo" class="login-logo">
            </div>

            <span class="login-portal-badge">
                <i class="fas fa-user-shield"></i> Admin Portal
            </span>

            <h2>Admin Portal</h2>
            <p class="subtitle">Secure Administrative Access</p>

            <div id="errorMsg" class="status-msg-pro error-msg">Invalid admin credentials</div>

            <form id="adminLoginForm">
                <div class="input-group-pro">
                    <label for="email">Admin Email</label>
                    <div class="input-field-wrapper">
                        <input type="email" id="email" placeholder="admin@majesticschool.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>
                <div class="input-group-pro">
                    <label for="password">Password</label>
                    <div class="input-field-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <div class="form-options-pro">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
                        <input type="checkbox" style="width: auto; margin: 0; accent-color: var(--premium-gold);"> Remember me
                    </label>
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn-pro">
                    <span>Secure Login</span>
                    <i class="fas fa-shield-halved"></i>
                </button>
            </form>

            <div class="secure-trust-badge">
                <i class="fas fa-shield-halved"></i> Protected & Secured Administrator Tunnel
            </div>

            <div class="portal-footer-pro">
                <div class="footer-divider">
                    <span>or</span>
                </div>

                <p class="login-hint">
                    Student or Parent? <a href="login.html">Login Here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script>
        // Auto-redirect if already logged in and token is active
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                console.log('[ADMIN_AUTH] Token found in localStorage. Verifying active session...');
                try {
                    const res = await fetch(apiUrl('/api/auth/me'), {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const userData = data.user || data;
                        const redirectToAdminDashboard = (reason) => {
                            console.log('REDIRECT TRIGGERED');
                            console.log('SOURCE FILE: admin-login.html');
                            console.log('TARGET: admin-dashboard.html');
                            console.log('REASON:', reason);
                            window.location.href = 'admin-dashboard.html';
                        };
                        const uRole = String(userData.role || '').toLowerCase().replace(/\s+/g, '');
                        if (uRole === 'superadmin' || uRole === 'staff' || uRole === 'admin') {
                            console.log('[ADMIN_AUTH] Admin session active. Auto-redirecting for:', userData.email);
                            redirectToAdminDashboard('ADMIN_SESSION_ACTIVE');
                        }
                    } else {
                        console.log('[ADMIN_AUTH] Stale token detected. Clearing.');
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user_role');
                        localStorage.removeItem('user_name');
                    }
                } catch (e) {
                    console.error('[ADMIN_AUTH] Failed verification on autoload:', e);
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('user_role');
                    localStorage.removeItem('user_name');
                }
            }
        });

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const submitBtnSpan = submitBtn.querySelector('span');

            console.log("[DEBUG] Admin login button clicked! Email:", email);

            // Set loading state
            submitBtn.disabled = true;
            submitBtnSpan.textContent = 'Verifying...';
            errorMsg.style.display = 'none';

console.log('Submitting login...');
                console.log('[ADMIN_AUTH] Initiating authentication request for:', email);
                const url = apiUrl('/api/auth/admin-login');
                const formData = { email, password };
                console.log("REQUEST URL:", url);
                console.log("REQUEST PAYLOAD:", formData);

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                console.log("[DEBUG] After fetch request completed");
                const data = await response.json();
                console.log('Response Status:', response.status);
                console.log('Response Body:', data);
                console.log('[ADMIN_AUTH] Server response status:', response.status, data);

                if (response.ok) {
                    const token = data.access_token || data.token;
                    if (token) {
                        localStorage.setItem('auth_token', token);
                        console.log('TOKEN SAVED:', token);
                        console.log("[DEBUG] Token successfully stored in localStorage:", localStorage.getItem('auth_token') ? "Token Exists (Masked)" : "No Token found");
                    }
                    const user = data.user || data;
                    if (user && user.role) {
                        localStorage.setItem('user_role', String(user.role).toUpperCase());
                    }
                    if (user && user.name) {
                        localStorage.setItem('user_name', user.name);
                    }
                    
                    // Show success feedback
                    errorMsg.style.color = '#15803d';
                    errorMsg.style.background = '#dcfce7';
                    errorMsg.style.borderColor = '#bbf7d0';
                    errorMsg.innerHTML = '<i class="fas fa-check-circle"></i> Admin login successful! Redirecting you now...';
                    errorMsg.style.display = 'flex';

                    console.log("[DEBUG] Redirection starting to admin-dashboard.html...");
                    const redirectToAdminDashboard = (reason) => {
                        console.log('REDIRECT TRIGGERED');
                        console.log('SOURCE FILE: admin-login.html');
                        console.log('TARGET: admin-dashboard.html');
                        console.log('REASON:', reason);
                        window.location.href = 'admin-dashboard.html';
                    };
                    setTimeout(() => {
                        console.log('[ADMIN_AUTH] Redirection path: admin-dashboard.html');
                        redirectToAdminDashboard('ADMIN_LOGIN_SUCCESS');
                    }, 800);
                } else {
                    console.warn("[DEBUG] Response error returned from login endpoint:", data.error);
                    submitBtn.disabled = false;
                    submitBtnSpan.textContent = 'Secure Admin Login';
                    errorMsg.style.color = '#dc2626';
                    errorMsg.style.background = '#fee2e2';
                    errorMsg.style.borderColor = '#fecaca';
                    errorMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error || 'Login failed. Please check your credentials.'}`;
                    errorMsg.style.display = 'flex';
                }
            } catch (err) {
                console.error("[DEBUG] Form submission encountered catch block exception:", err);
                console.error('[ADMIN_AUTH] Login connection exception:', err);
                submitBtn.disabled = false;
                submitBtnSpan.textContent = 'Secure Admin Login';
                errorMsg.style.color = '#dc2626';
                errorMsg.style.background = '#fee2e2';
                errorMsg.style.borderColor = '#fecaca';
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection failed. Unable to reach authentication server.';
                errorMsg.style.display = 'flex';
            }
        });
    </script>
</body>

</html>
