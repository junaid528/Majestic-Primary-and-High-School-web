<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your password for Majestic Primary and High School, Mysore account. Secure password recovery for students, parents, and administrators.">
    <meta name="keywords" content="forgot password Majestic School Mysore, password reset, account recovery, login help">
    <meta name="author" content="Majestic Primary and High School">
    <link rel="canonical" href="https://www.majesticschoolmysore.com/forgot-password.html">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <title>Forgot Password | Majestic Primary and High School</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-blue: #0f172a; /* Sophisticated deep slate blue */
            --brand-blue: #1e3a8a;
            --premium-gold: #facc15;
            --premium-green: #10b981;
            --white: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.88) 0%, rgba(30, 41, 59, 0.7) 50%, rgba(15, 23, 42, 0.9) 100%), 
                        url('assets/school_building.jpeg') center/cover no-repeat fixed;
            overflow: hidden;
            position: relative;
        }

        /* Ambient dramatic vignette overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 20%, rgba(15, 23, 42, 0.95) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .forgot-container-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            box-sizing: border-box;
        }

        .forgot-glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: white;
            position: relative;
            overflow: visible;
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) forwards, glowPulse 6s infinite ease-in-out;
        }

        @keyframes cardAppear {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes glowPulse {
            0% {
                border-color: rgba(255, 255, 255, 0.08);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(250, 204, 21, 0.03);
            }
            50% {
                border-color: rgba(250, 204, 21, 0.15);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 45px rgba(250, 204, 21, 0.08);
            }
            100% {
                border-color: rgba(255, 255, 255, 0.08);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(250, 204, 21, 0.03);
            }
        }

        /* Centered Logo Container */
        .logo-wrapper-pro {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px auto;
            border: 2px solid rgba(250, 204, 21, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 15px rgba(250, 204, 21, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-wrapper-pro:hover {
            transform: scale(1.04);
            border-color: rgba(250, 204, 21, 0.5);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4), 0 0 25px rgba(250, 204, 21, 0.3);
        }

        .login-logo {
            width: 52px !important;
            height: 52px !important;
            object-fit: contain !important;
            display: block !important;
            margin: 0 !important;
        }

        /* Secure Badge */
        .login-portal-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(250, 204, 21, 0.08);
            border: 1px solid rgba(250, 204, 21, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .forgot-glass-card h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            margin: 0 0 8px 0;
            color: var(--white);
            letter-spacing: -0.5px;
        }

        .forgot-glass-card p.subtitle {
            font-size: 0.92rem;
            color: rgba(255, 255, 255, 0.65);
            margin: 0 0 35px 0;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        /* Form Design */
        .input-group-pro {
            margin-bottom: 26px;
            text-align: left;
        }

        .input-group-pro label {
            display: block;
            font-size: 0.74rem;
            font-weight: 700;
            margin-bottom: 8px;
            margin-left: 2px;
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-field-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .input-group-pro input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px 20px 15px 48px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        .input-group-pro input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group-pro input:focus {
            background: rgba(15, 23, 42, 0.6);
            border-color: var(--premium-gold);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.15), inset 0 0 5px rgba(255, 255, 255, 0.05);
        }

        .input-group-pro input:focus + .input-icon {
            color: var(--premium-gold);
            transform: translateY(-50%) scale(1.05);
        }

        /* Gold Gradient Button */
        .login-btn-pro {
            width: 100%;
            background: linear-gradient(135deg, #facc15, #ca8a04);
            color: #0f172a !important;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 18px rgba(202, 138, 4, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn-pro:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 28px rgba(202, 138, 4, 0.45) , 0 0 20px rgba(250, 204, 21, 0.15);
            background: linear-gradient(135deg, #ffffff, #facc15);
        }

        /* Success & Error Cards (Softer Success UI) */
        .status-msg-pro {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.88rem;
            display: none;
            align-items: center;
            gap: 10px;
            justify-content: center;
            text-align: center;
        }

        .error-msg {
            color: #f87171;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .success-msg {
            color: var(--premium-green);
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* Secure Trust Note */
        .secure-trust-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .secure-trust-badge i {
            color: var(--premium-green);
            font-size: 0.85rem;
        }

        /* Footer Redesign */
        .portal-footer-pro {
            margin-top: 30px;
            text-align: center;
        }

        .footer-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 22px 0;
        }

        .footer-divider::before, .footer-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-divider:before {
            margin-right: 15px;
        }

        .footer-divider:after {
            margin-left: 15px;
        }

        .footer-divider span {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-hint {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
        }

        .login-hint a {
            color: var(--premium-gold);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-hint a:hover {
            color: white;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.4);
        }

        /* Fixed Pill Back Button */
        .back-home {
            position: fixed;
            top: 30px;
            left: 30px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            opacity: 0.9;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(15, 23, 42, 0.55);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
        }

        .back-home:hover {
            opacity: 1;
            background: var(--premium-gold);
            color: #0f172a !important;
            border-color: var(--premium-gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.3);
        }

        .back-home i {
            transition: transform 0.3s ease;
        }

        .back-home:hover i {
            transform: translateX(-3px);
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                height: auto !important;
                min-height: 100vh !important;
                padding: 110px 16px 40px 16px !important;
                box-sizing: border-box !important;
                overflow-y: auto !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }

            .forgot-container-wrapper {
                padding: 0;
            }

            .forgot-glass-card {
                padding: 40px 24px;
                border-radius: 24px !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .back-home {
                top: 24px !important;
                left: 16px !important;
                right: 16px !important;
                justify-content: center !important;
                width: auto !important;
            }
        }
    </style>
</head>

<body>
    <a href="login.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Login</a>

    <div class="forgot-container-wrapper">
        <div class="forgot-glass-card">
            <div class="logo-wrapper-pro">
                <img src="assets/logo.png" referrerPolicy="no-referrer" alt="Majestic School Logo" class="login-logo">
            </div>

            <span class="login-portal-badge">
                <i class="fas fa-key"></i> Key Recovery
            </span>

            <h2>Reset Password</h2>
            <p class="subtitle">Enter your registered email address and we will securely dispatch a link to restore your access.</p>

            <div id="statusMsg" class="status-msg-pro"></div>

            <form id="forgotForm">
                <div class="input-group-pro">
                    <label for="email">Email Address</label>
                    <div class="input-field-wrapper">
                        <input type="email" id="email" placeholder="example@email.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn-pro">
                    <span>Send Recovery Link</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="secure-trust-badge">
                <i class="fas fa-shield-halved"></i> Protected & Secure Verification
            </div>

            <div class="portal-footer-pro">
                <div class="footer-divider">
                    <span>or</span>
                </div>

                <p class="login-hint">
                    Remembered your password? <a href="login.html">Login Here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('statusMsg');

            try {
                const response = await fetch(apiUrl('/api/auth/forgot-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    statusMsg.className = 'status-msg-pro success-msg';
                    statusMsg.style.display = 'flex';
                    statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Recovery link sent successfully! Please check your inbox.';
                } else {
                    const data = await response.json();
                    statusMsg.className = 'status-msg-pro error-msg';
                    statusMsg.style.display = 'flex';
                    statusMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (data.error || 'Failed to send recovery link.');
                }
            } catch (err) {
                statusMsg.className = 'status-msg-pro error-msg';
                statusMsg.style.display = 'flex';
                statusMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Unable to connect to the recovery service. Please try again.';
            }
        });
    </script>
</body>

</html>
