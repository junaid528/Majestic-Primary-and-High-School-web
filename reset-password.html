<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your password for Majestic Primary and High School, Mysore. Create a new secure password for your account.">
    <meta name="keywords" content="reset password Majestic School Mysore, change password, account security, new password">
    <meta name="author" content="Majestic Primary and High School">
    <link rel="canonical" href="https://www.majesticschoolmysore.com/reset-password.html">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <title>Reset Password | Majestic Primary and High School</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-blue: #1e3a8a;
            --premium-gold: #facc15;
            --premium-green: #2e7d32;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('assets/school_building.jpeg') center/cover no-repeat fixed;
            overflow: hidden;
        }

        .login-glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 60px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        .login-logo {
            width: 80px !important;
            height: 80px !important;
            object-fit: contain !important;
            margin: 0 auto 25px auto !important;
            display: block !important;
            background: transparent !important;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
        }
    

        .login-glass-card h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--premium-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-glass-card p.subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .input-group-pro {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group-pro label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 5px;
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group-pro input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
            box-sizing: border-box;
        }

        .input-group-pro input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--premium-gold);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.2);
        }

        .login-btn-pro {
            width: 100%;
            background: var(--premium-gold);
            color: #1e3a8a;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
        }

        .login-btn-pro:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(250, 204, 21, 0.4);
            background: white;
        }

        .status-msg-pro {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid transparent;
        }

        .error-msg { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border-color: rgba(255, 77, 77, 0.2); }
        .success-msg { background: rgba(46, 125, 50, 0.1); color: #4caf50; border-color: rgba(46, 125, 50, 0.2); }
    
        .back-home {
            position: absolute;
            top: 25px;
            left: 25px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            opacity: 0.95;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.45);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Poppins', sans-serif;
        }
    

        .back-home:hover {
            opacity: 1;
            background: var(--premium-gold);
            color: #1e3a8a !important;
            border-color: var(--premium-gold);
            transform: translateX(-3px);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.4);
        }
    

        @media (max-width: 480px) {
            body {
                height: auto !important;
                min-height: 100vh !important;
                padding: 100px 16px 40px 16px !important;
                box-sizing: border-box !important;
                overflow: auto !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
            }
            .login-glass-card {
                padding: 35px 20px !important;
                border-radius: 20px !important;
                margin: 0 auto !important;
                width: 100% !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
            }
            .back-home {
                top: 20px !important;
                left: 20px !important;
                right: 20px !important;
                justify-content: center !important;
                text-align: center !important;
            }
        }
    
</style>
</head>

<body>
    <a href="login.html" class="back-home"><i class="fas fa-arrow-left"></i> BACK TO LOGIN</a>
    <div class="login-glass-card">
        <img src="assets/logo.png" referrerPolicy="no-referrer" alt="Majestic School Logo" class="login-logo">
        <h2>Create Password</h2>
        <p class="subtitle">Secure your account with a new password.</p>

        <div id="statusMsg" class="status-msg-pro"></div>

        <form id="resetForm">
            <div class="input-group-pro">
                <label>New Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="input-group-pro">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn-pro">Update Password</button>
        </form>
    </div>

    <script src="js/api-config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusMsg = document.getElementById('statusMsg');

            if (password !== confirmPassword) {
                statusMsg.className = 'status-msg-pro error-msg';
                statusMsg.textContent = 'Passwords do not match.';
                statusMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(apiUrl('/api/auth/reset-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, password })
                });

                if (response.ok) {
                    statusMsg.className = 'status-msg-pro success-msg';
                    statusMsg.textContent = 'Password reset successful! Redirecting...';
                    statusMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const data = await response.json();
                    statusMsg.className = 'status-msg-pro error-msg';
                    statusMsg.textContent = data.error || 'Error resetting password.';
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.className = 'status-msg-pro error-msg';
                statusMsg.textContent = 'Unable to connect to the reset service. Please try again.';
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
